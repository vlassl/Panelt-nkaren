<style>
  :root{
    --paper:#eceae2;        /* drafting paper */
    --panel:#f6f5f0;        /* input surface */
    --ink:#20211c;          /* drawing ink */
    --ink-soft:#5b5c53;
    --line:#c8c6bb;         /* hairlines */
    --dim:#c1462f;          /* måttlinjer / pilmått – rött, som på ritningar */
    --steel:#2f5d6b;        /* sekundär accent */
    --wood:#c9a26b;         /* bottenbräda */
    --wood-edge:#8a6a3c;
    --lock:#a9803f;         /* lock */
    --lock-edge:#6e4f20;
    --good:#3a6b3a;
    --bad:#b23a2e;
    --mono:'Spline Sans Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --disp:'Familjen Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--disp);
    background:var(--paper);
    color:var(--ink);
    line-height:1.45;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:
      linear-gradient(rgba(0,0,0,.028) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,0,0,.028) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .wrap{max-width:940px;margin:0 auto;padding:18px 16px 60px}

  header{border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:18px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
  .head h1{font-size:clamp(26px,8vw,44px);font-weight:700;margin:0;letter-spacing:-.015em;line-height:1}
  .card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  @font-face{
    font-family:'StarJediLocal';
    src:local('Star Jedi'), local('StarJedi'), local('Starjedi'), local('Star Jedi Rounded');
    font-display:swap;
  }
  .apptitle{margin:0 !important;font-family:'StarJediLocal','Orbitron',var(--disp) !important;font-weight:700 !important;font-size:clamp(19px,5.6vw,28px) !important;color:var(--ink) !important;letter-spacing:.04em;text-transform:none;line-height:1.15}
  .mascot{flex:0 0 auto;width:clamp(58px,16vw,84px)}
  .mascot svg{display:block;width:100%;height:auto}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--steel);display:flex;justify-content:space-between;align-items:baseline}
  h1{font-size:clamp(26px,7vw,40px);font-weight:700;margin:2px 0 0;letter-spacing:-.01em}
  .ver{font-size:9px;font-family:var(--mono);color:var(--ink-soft);font-weight:400}
  .lede{font-size:14px;color:var(--ink-soft);max-width:60ch;margin-top:4px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:16px;margin-bottom:16px}
  .card > h2{font-size:12px;font-family:var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--steel);margin:0 0 14px;font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 14px}
  @media(min-width:620px){.grid{grid-template-columns:repeat(4,1fr)}}
  .field{display:flex;flex-direction:column;gap:4px}
  .field.wide{grid-column:1/-1}
  @media(min-width:620px){.field.wide{grid-column:auto}}
  label{font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:baseline;gap:6px}
  label .u{font-family:var(--mono);font-size:10px;color:var(--steel)}
  .inp{position:relative;display:flex;align-items:center}
  input[type=text]{
    width:100%;font-family:var(--mono);font-size:16px;font-weight:500;
    padding:9px 10px;border:1px solid var(--line);border-radius:2px;background:#fff;color:var(--ink);
    outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input[type=text]:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(47,93,107,.14)}
  .reset-btn{position:absolute;right:6px;border:none;background:transparent;color:var(--ink-soft);
    font-size:15px;cursor:pointer;padding:2px 4px;border-radius:3px}
  .reset-btn:hover{color:var(--dim);background:rgba(0,0,0,.05)}

  .hint{margin-top:6px;font-size:11px;color:var(--ink-soft);line-height:1.4}
  .exact{margin-top:8px;font-size:11px;color:var(--ink-soft)}
  .exact .hd{font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--steel);font-size:10px;display:block;margin-bottom:5px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:var(--mono);font-size:12px;background:#fff;border:1px solid var(--line);border-radius:2px;
    padding:5px 9px;cursor:pointer;color:var(--ink);display:flex;flex-direction:column;line-height:1.25;gap:1px;transition:border-color .12s}
  .chip:hover{border-color:var(--dim)}
  .chip.cur{border-color:var(--dim);box-shadow:inset 0 0 0 1px var(--dim)}
  .chip b{color:var(--dim);font-weight:600}
  .chip span{font-size:10px;color:var(--ink-soft)}
  .sub{grid-column:1/-1;margin-bottom:-5px;font-size:11px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;margin-top:2px}

  /* Resultat */
  .verdict{font-size:15px;margin:0 0 14px}
  .verdict.ok::before{content:"✓ ";color:var(--good)}
  .verdict.no::before{content:"✕ ";color:var(--bad)}

  .opts{display:flex;flex-wrap:wrap;gap:10px}
  .opt{flex:1 1 150px;min-width:150px;text-align:left;background:#fff;border:1px solid var(--line);
    border-radius:2px;padding:11px 13px;cursor:pointer;transition:border-color .12s,box-shadow .12s;
    font-family:inherit;color:inherit}
  .opt:hover{border-color:var(--steel)}
  .opt.sel{border-color:var(--dim);box-shadow:inset 0 0 0 1px var(--dim)}

  .opt.sel .tag .best{color:var(--dim);font-weight:600}
  .opt .n{font-size:26px;font-weight:700;margin:3px 0 1px;font-family:var(--mono)}
  .opt .n small{font-size:12px;font-weight:500;color:var(--ink-soft)}
  .opt .g{font-family:var(--mono);font-size:13px}
  .opt .g b{color:var(--dim)}
  .opt .ov{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .opt .ov.bad{color:var(--bad)}
  .opt .bar{height:4px;background:var(--line);border-radius:2px;margin-top:8px;position:relative;overflow:hidden}
  .opt .bar i{position:absolute;top:0;bottom:0;width:2px;background:var(--dim)}
  .opt .bar .mid{position:absolute;top:-2px;bottom:-2px;width:1px;background:var(--steel)}

  .near{background:#fff;border:1px solid var(--line);border-left:3px solid var(--dim);border-radius:2px;padding:12px 14px;margin-top:12px;font-size:14px}
  .near h3{margin:0 0 8px;font-size:12px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .near .row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-top:1px dashed var(--line);font-family:var(--mono);font-size:13px}
  .near .row:first-of-type{border-top:none}
  .near .row .lab{color:var(--ink-soft);font-family:var(--disp)}

  .detail{margin-top:16px;border-top:1px dashed var(--line);padding-top:12px}
  .detail .dhd{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);margin-bottom:6px}
  .detail svg{display:block;width:100%;max-width:340px;height:auto}
  .facts{display:flex;flex-wrap:wrap;gap:6px 22px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:12px}
  .facts b{color:var(--ink);font-weight:600}
  .warn{color:var(--bad);font-family:var(--mono);font-size:12.5px;margin-top:10px}

  /* Ritning */
  .draw-card{padding:14px 8px 10px}
  .draw-card h2{padding:0 8px}
  .svgbox{width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
  .svgbox svg{display:block;width:100%;height:auto;min-width:520px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--ink-soft);padding:4px 8px 0}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{width:14px;height:10px;border-radius:1px;border:1px solid}
  .sw.b{background:var(--wood);border-color:var(--wood-edge)}
  .sw.l{background:var(--lock);border-color:var(--lock-edge)}
  .sw.d{background:transparent;border:none;position:relative;width:16px}
  .sw.d::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:var(--dim)}

  /* Tabell */
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px;margin-top:2px}
  th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel);font-weight:600;border-bottom:1.5px solid var(--ink)}
  td.pos{color:var(--dim);font-weight:500}
  tbody tr:hover{background:rgba(47,93,107,.05)}
  .tablescroll{overflow-x:auto}

  footer{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:center;margin-top:24px;line-height:1.7}
  .hidden{display:none}
</style>

          <path d="M60 82 l-8 -5 v10 z M60 82 l8 -5 v10 z" fill="var(--steel)" stroke="var(--ink)" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="60" cy="82" r="2.4" fill="var(--steel)" stroke="var(--ink)" stroke-width="1.2"/>

    <div class="grid">

      <div class="field">

        <thead><tr><th>Bräda</th><th>Vänsterkant</th><th>Centrum</th><th>Högerkant</th></tr></thead>
        <tbody></tbody>

<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const EPS = 1e-6;
  const DEF_GDES = 10;
  const state = { selected: 0, desiredManual: true, opts: [] };

  // Säker uttrycksutvärdering (tillåter enkel aritmetik i fälten)
  function parseNum(str, fallback){
    if(str==null) return fallback;
    let s = String(str).trim().replace(/,/g,'.');
    if(s==='') return fallback;
    if(/^[0-9+\-*/(). ]+$/.test(s)){
      try{ const v = Function('"use strict";return ('+s+')')(); if(isFinite(v)) return v; }catch(e){}
    }
    const f = parseFloat(s);
    return isFinite(f) ? f : fallback;
  }
  const r1 = x => Math.round(x*10)/10;
  const fmt = x => { const v = r1(x); return (Math.abs(v-Math.round(v))<0.05 ? String(Math.round(v)) : v.toFixed(1)); };
  const fmt0 = x => String(Math.round(x));   // närmsta mm för pilmått

  function readInputs(){
    const wb=parseNum($('wb').value,145), tb=parseNum($('tb').value,22);
    const wl=parseNum($('wl').value,45),  tl=parseNum($('tl').value,22);
    const gmin=parseNum($('gmin').value,5), gmax=parseNum($('gmax').value,25);
    let gdes;
    if(state.desiredManual){ gdes=parseNum($('gdes').value,DEF_GDES); }
    else { gdes=(gmin+gmax)/2; $('gdes').value=fmt(gdes); }
    const L=parseNum($('L').value,3600);
    const off=parseNum($('off').value,0);
    return {wb,tb,wl,tl,gmin,gmax,gdes,L,off};
  }

  // g(N) = (L - N*wb) / (N-1)
  function solve(p){
    const {wb,gmin,gmax,gdes,L} = p;
    const opts=[];
    const maxN = Math.max(2, Math.floor(L/Math.max(wb,1)) + 3);
    for(let N=2; N<=maxN; N++){
      const g = (L - N*wb)/(N-1);
      if(g >= gmin-EPS && g <= gmax+EPS){
        opts.push({N, g, cc:wb+g, diff:Math.abs(g-gdes)});
      }
    }
    opts.sort((a,b)=> a.diff-b.diff || a.N-b.N);

    let near=null;
    if(opts.length===0){
      let below=null, above=null, best=null;
      for(let N=2; N<=maxN+8; N++){
        const lo = N*wb + (N-1)*gmin;   // g = gmin  (kortast för detta N)
        const hi = N*wb + (N-1)*gmax;   // g = gmax  (längst för detta N)
        const ideal = N*wb + (N-1)*gdes; // ger exakt önskad glipa
        if(hi < L-EPS && (below===null || hi>below.L)) below={L:hi, N, g:gmax};
        if(lo > L+EPS && (above===null || lo<above.L)) above={L:lo, N, g:gmin};
        if(best===null || Math.abs(ideal-L)<Math.abs(best.L-L)) best={L:ideal, N, g:gdes};
      }
      near={below,above,best};
    }
    return {opts, near};
  }

  /* ---------- Ritning: horisontalsnitt + pilmått ---------- */
  function drawSVG(p, opt){
    if(!opt){ $('svgHolder').innerHTML=''; return; }
    const {wb,wl,L} = p;
    const off = p.off||0;
    const {N,g,cc} = opt;

    // Fasadvy (skalenlig i x-led). Lock ca 500 mm, bottenbrädor en brädbredd längre ner så glipan syns.
    const Hface = 500;
    const ref = Math.max(L*0.05, 40);   // referensmått för font/måttzoner
    const mL=70, mR=70, mTop=ref*0.8;

    const yTop = mTop;                   // gemensam ovankant för lock + bottenbräda
    const yLockBot = yTop + Hface;       // lockens underkant
    const yBot = yLockBot + wb;          // bottenbrädans underkant (en brädbredd lägre)

    // Måttzoner under fasaden
    const ccY   = yBot + ref*1.0;
    const ordTop= ccY + ref*0.7;
    const rowStep = Math.max(ref*0.6, (L/N)*0.85);
    const ordBase = ordTop + rowStep*N + ref*0.3;
    const totY  = ordBase + ref*0.9;
    const H = totY + ref*1.3;
    const W = mL + L + mR;

    const fs = Math.max(L/70, 20);
    const fsS = fs*0.82;
    const aw = fs*0.5;
    const lw = Math.max(L/900,0.8);
    const X = mm => mL + mm;

    const boards=[], locks=[];
    for(let k=0;k<N;k++){
      const left=k*cc, center=left+wb/2, right=left+wb;
      boards.push({k:k+1,left,center,right});
    }
    for(let k=0;k<N-1;k++){
      const gc = (k+1)*cc - g/2;      // glipans centrum
      locks.push({k:k+1, center:gc, left:gc-wl/2, right:gc+wl/2});
    }

    const s=[];
    s.push(`<svg viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" xmlns="http://www.w3.org/2000/svg" font-family="Spline Sans Mono, monospace">`);
    s.push(`<defs>
      <marker id="ah" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
        <path d="M0,1 L7,4 L0,7" fill="none" stroke="var(--dim)" stroke-width="1.4"/></marker>
      <marker id="ah2" markerWidth="8" markerHeight="8" refX="1.5" refY="4" orient="auto">
        <path d="M7,1 L0,4 L7,7" fill="none" stroke="var(--dim)" stroke-width="1.4"/></marker>
      <pattern id="grain" width="${Math.max(wb/3,8).toFixed(1)}" height="${((yBot-yTop)/6).toFixed(1)}" patternUnits="userSpaceOnUse">
        <rect width="100%" height="100%" fill="var(--wood)"/>
        <line x1="0" y1="0" x2="0" y2="${(yBot-yTop).toFixed(1)}" stroke="var(--wood-edge)" stroke-opacity="0.16" stroke-width="0.8"/>
      </pattern>
    </defs>`);

    // Glipor – synlig skugga i den nedre remsan (under locken)
    for(let k=0;k<N-1;k++){
      const gl = boards[k].right, gr = boards[k+1].left;
      s.push(`<rect x="${X(gl).toFixed(2)}" y="${yLockBot.toFixed(2)}" width="${(gr-gl).toFixed(2)}" height="${(yBot-yLockBot).toFixed(2)}" fill="var(--ink)" opacity="0.14"/>`);
    }

    // Bottenbrädor – hela höjden, en brädbredd under locken
    boards.forEach(b=>{
      s.push(`<rect x="${X(b.left).toFixed(2)}" y="${yTop.toFixed(2)}" width="${wb.toFixed(2)}" height="${(yBot-yTop).toFixed(2)}" fill="url(#grain)" stroke="var(--wood-edge)" stroke-width="${lw}"/>`);
    });
    // Lock ovanpå, centrerade över gliporna – slutar en brädbredd ovanför bottenbrädans underkant
    locks.forEach(l=>{
      s.push(`<rect x="${X(l.left).toFixed(2)}" y="${yTop.toFixed(2)}" width="${wl.toFixed(2)}" height="${Hface.toFixed(2)}" fill="var(--lock)" stroke="var(--lock-edge)" stroke-width="${lw}"/>`);
      s.push(`<line x1="${X(l.left).toFixed(2)}" y1="${yTop}" x2="${X(l.left).toFixed(2)}" y2="${yLockBot}" stroke="var(--lock-edge)" stroke-width="${lw*0.6}" opacity="0.5"/>`);
    });

    // Yttermått-hjälplinjer (ytterkant vänster/höger)
    [0,L].forEach(m=>{
      s.push(`<line x1="${X(m)}" y1="${yTop}" x2="${X(m)}" y2="${totY+fs*0.3}" stroke="var(--ink)" stroke-width="${lw*0.8}" stroke-dasharray="${fs*0.12} ${fs*0.12}" opacity="0.5"/>`);
    });

    // c/c-mått (representativt, mellan bräda 1 och 2)
    if(N>=2){
      const c1=boards[0].center, c2=boards[1].center;
      s.push(dimLine(X(c1),X(c2),ccY,`c/c ${fmt0(cc)}`,fs,aw));
      s.push(`<text x="${X((c2+boards[N-1].center)/2)}" y="${(ccY-fs*0.5).toFixed(1)}" font-size="${fsS}" fill="var(--ink-soft)" text-anchor="middle">${N-1} lika mellanrum · c/c ${fmt0(cc)} mm</text>`);
      boards.forEach(b=>{
        s.push(`<line x1="${X(b.center)}" y1="${yBot}" x2="${X(b.center)}" y2="${ccY}" stroke="var(--dim)" stroke-width="${lw*0.7}" opacity="0.3"/>`);
      });
    }

    // Pilmått från startkant till högerkant på varje bottenbräda (avrundat till mm)
    s.push(`<line x1="${X(0)}" y1="${ordTop-fs*0.3}" x2="${X(0)}" y2="${ordBase}" stroke="var(--dim)" stroke-width="${lw}"/>`);
    s.push(`<text x="${X(0)}" y="${(ordTop-fs*0.6).toFixed(1)}" font-size="${fsS}" fill="var(--dim)" text-anchor="middle">${fmt0(off)}</text>`);
    boards.forEach((b,i)=>{
      const yy = ordTop + rowStep*(i+1);
      s.push(`<line x1="${X(0)}" y1="${yy}" x2="${X(b.right)}" y2="${yy}" stroke="var(--dim)" stroke-width="${lw}" marker-end="url(#ah)"/>`);
      s.push(`<line x1="${X(b.right)}" y1="${yBot}" x2="${X(b.right)}" y2="${yy}" stroke="var(--dim)" stroke-width="${lw*0.6}" opacity="0.3"/>`);
      s.push(`<text x="${(X(b.right)+aw*1.4).toFixed(1)}" y="${(yy - fs*0.18).toFixed(1)}" font-size="${fsS}" fill="var(--dim)">${fmt0(b.right+off)}</text>`);
      s.push(`<text x="${(X(0)+fs*0.3).toFixed(1)}" y="${(yy-fs*0.18).toFixed(1)}" font-size="${fsS*0.85}" fill="var(--ink-soft)">#${b.k}</text>`);
    });

    // Total längd
    s.push(dimLine(X(0),X(L),totY,`Total ${fmt0(L)}`,fs,aw));

    s.push(`</svg>`);
    $('svgHolder').innerHTML = s.join('');
  }

  function dimLine(x1,x2,y,label,fs,aw){
    const lw = Math.max((x2-x1)/900,0.8);
    return `<g>
      <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="var(--dim)" stroke-width="${lw+0.2}" marker-start="url(#ah2)" marker-end="url(#ah)"/>
      <line x1="${x1}" y1="${y-fs*0.35}" x2="${x1}" y2="${y+fs*0.35}" stroke="var(--dim)" stroke-width="${lw}"/>
      <line x1="${x2}" y1="${y-fs*0.35}" x2="${x2}" y2="${y+fs*0.35}" stroke="var(--dim)" stroke-width="${lw}"/>
      <text x="${(x1+x2)/2}" y="${(y-fs*0.35).toFixed(1)}" font-size="${fs}" fill="var(--dim)" text-anchor="middle" font-weight="500">${label}</text>
    </g>`;
  }

  /* ---------- Totallängder för exakt önskad glipa ---------- */
  function renderExact(p){
    const off=p.off||0;
    const hint=$('offHint');
    if(hint){
      hint.textContent = off===0
        ? 'Mät från panelens vänsterkant (0). Ange värde för att mäta från t.ex. husets hörn.'
        : `Panelen börjar på ${fmt0(off)} och slutar på ${fmt0(off+p.L)} mm.`;
    }
    const {wb,gdes,L} = p;
    const cc = wb+gdes;
    const Nc = Math.round((L+gdes)/cc);
    let list=[];
    for(let N=Nc-2; N<=Nc+2; N++){
      if(N<2) continue;
      const Le = N*wb + (N-1)*gdes;
      if(Le<=0) continue;
      list.push({N, L:Le, d:Le-L});
    }
    list.sort((a,b)=>Math.abs(a.d)-Math.abs(b.d));
    list = list.slice(0,3).sort((a,b)=>a.L-b.L);
    const el=$('exact');
    if(list.length===0){ el.innerHTML=''; return; }
    el.innerHTML = `<span class="hd">Totallängd för exakt ${fmt(gdes)} mm glipa</span><div class="chips">`+
      list.map(o=>{
        const Lr=Math.round(o.L), d=Lr-Math.round(L), sign=d>0?'+':'';
        const cur = Math.abs(d)<0.5 ? ' cur':'';
        return `<button class="chip${cur}" data-l="${Lr}"><b>${Lr} mm</b><span>${o.N} brädor · ${sign}${d}</span></button>`;
      }).join('')+`</div>`;
    el.querySelectorAll('.chip').forEach(c=>{
      c.addEventListener('click',()=>{ $('L').value=c.dataset.l; state.selected=0; render(); });
    });
  }

  /* ---------- Rendera resultat ---------- */
  function render(){
    const p = readInputs();
    const {opts, near} = solve(p);
    state.opts = opts;
    renderExact(p);

    // Facts
    const facts=[];
    facts.push(`Fasadtjocklek <b>${fmt(p.tb+p.tl)} mm</b>`);
    facts.push(`Spann glipa <b>${fmt(p.gmin)}–${fmt(p.gmax)} mm</b>`);
    facts.push(`Önskvärd <b>${fmt(p.gdes)} mm</b>`);
    $('facts').innerHTML = facts.join('');

    const verdict=$('verdict'), optsEl=$('opts'), nearWrap=$('nearWrap'), warnEl=$('warn');

    if(opts.length>0){
      if(state.selected>=opts.length) state.selected=0;
      verdict.className='verdict ok';
      const alt = opts.length===1 ? 'ett alternativ' : `${opts.length} alternativ`;
      verdict.textContent = `Går ihop – ${alt}. Bäst: ${opts[0].N} bottenbrädor med glipa ${fmt(opts[0].g)} mm.`;
      nearWrap.innerHTML='';

      optsEl.innerHTML = opts.map((o,i)=>{
        const sel = i===state.selected ? ' sel':'';
        const best = i===0 ? '<span class="best">bäst</span>':'<span>&nbsp;</span>';
        const frac = (o.g - p.gmin)/Math.max(p.gmax-p.gmin,EPS);
        const mid  = (p.gdes - p.gmin)/Math.max(p.gmax-p.gmin,EPS);
        const ov = (p.wl - o.g)/2;   // lockets överlapp per sida
        const ovBad = ov <= 0;
        return `<button class="opt${sel}" data-i="${i}">
          <div class="tag"><span>Alt ${i+1}</span>${best}</div>
          <div class="n">${o.N}<small> brädor</small></div>
          <div class="g">glipa <b>${fmt(o.g)}</b> mm · c/c ${fmt(o.cc)}</div>
          <div class="ov${ovBad?' bad':''}">överlapp ${fmt(ov)} mm/sida</div>
          <div class="bar"><span class="mid" style="left:${(mid*100).toFixed(1)}%"></span><i style="left:${(Math.max(0,Math.min(1,frac))*100).toFixed(1)}%"></i></div>
        </button>`;
      }).join('');

      optsEl.querySelectorAll('.opt').forEach(b=>{
        b.addEventListener('click',()=>{ state.selected=+b.dataset.i; renderSelected(p); });
      });

      const o = opts[state.selected];
      const overlap = (p.wl - o.g)/2;
      if(p.wl <= o.g + EPS){
        warnEl.classList.remove('hidden');
        warnEl.textContent = `⚠ Locket (${fmt(p.wl)} mm) täcker inte glipan (${fmt(o.g)} mm). Öka lockbredden.`;
      } else if(overlap < 10){
        warnEl.classList.remove('hidden');
        warnEl.textContent = `⚠ Locket överlappar bara ${fmt(overlap)} mm på varje bottenbräda (rekommenderat ≥ 10 mm).`;
      } else {
        warnEl.classList.add('hidden');
      }

      $('drawCard').classList.remove('hidden');
      $('tableCard').classList.remove('hidden');
      renderSelected(p);

    } else {
      verdict.className='verdict no';
      verdict.textContent = `Ingen indelning ryms i spannet ${fmt(p.gmin)}–${fmt(p.gmax)} mm vid ${fmt(p.L)} mm. Prova en närliggande totallängd:`;
      optsEl.innerHTML='';
      warnEl.classList.add('hidden');

      const parts=[`<div class="near"><h3>Närliggande längder som går ihop</h3>`];
      if(near.below){
        parts.push(row('Kortare', near.below.L, near.below.N, near.below.g, p));
      }
      if(near.above){
        parts.push(row('Längre', near.above.L, near.above.N, near.above.g, p));
      }
      if(near.best){
        parts.push(row('Exakt önskad glipa', near.best.L, near.best.N, p.gdes, p, true));
      }
      if(!near.below && !near.above){
        parts.push(`<div class="row"><span class="lab">–</span><b>Ingen lösning hittad</b></div>`);
      }
      parts.push(`</div>`);
      nearWrap.innerHTML = parts.join('');

      $('drawCard').classList.add('hidden');
      $('tableCard').classList.add('hidden');
      $('svgHolder').innerHTML='';
      $('detail').innerHTML='';
    }
  }

  function row(lab, L, N, g, p, ideal){
    const dl = L - p.L;
    const sign = dl>0?'+':'';
    return `<div class="row"><span class="lab">${lab}${ideal?' ':''}</span>
      <span><b>${fmt(L)} mm</b> <span style="color:var(--ink-soft)">(${sign}${fmt(dl)})</span> · ${N} brädor · glipa ${fmt(g)} mm</span></div>`;
  }

  /* ---------- Detalj: genomskärning med vald glipa ---------- */
  function drawDetail(p, opt){
    const el = $('detail');
    if(!opt){ el.innerHTML=''; return; }
    const {wb,tb,wl,tl} = p;
    const {g} = opt;
    const ov = (p.wl - g)/2;             // lockets överlapp per sida
    const bad = ov <= 0;

    // 4 bottenbrädor (yttersta kapade på mitten) + 3 lock
    const half = wb/2;
    const W0 = 3*wb + 3*g;               // ritad bredd: halv + 2 hela + halv + 3 glipor
    const mX = Math.max(W0*0.05, 18), mTop = 34, mBot = 48;
    const W = W0 + mX*2;
    const H = mTop + tl + tb + mBot;

    const yLock = mTop, yBoard = mTop + tl, yBot = yBoard + tb;
    const fs = Math.max(W0/40, 7);
    const lw = Math.max(W0/650, 0.45);

    // Brädornas x-lägen (b1 och b4 halva)
    const b = [];
    let x = mX;
    b.push({x:x, w:half, cut:'left'});   x += half + g;
    b.push({x:x, w:wb,   cut:null});     x += wb + g;
    b.push({x:x, w:wb,   cut:null});     x += wb + g;
    b.push({x:x, w:half, cut:'right'});

    // Gliporna
    const gaps = [];
    for(let i=0;i<3;i++){
      const gl = b[i].x + b[i].w, gr = b[i+1].x;
      gaps.push({gl, gr, c:(gl+gr)/2});
    }

    const s=[];
    s.push(`<svg viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" xmlns="http://www.w3.org/2000/svg" font-family="Spline Sans Mono, monospace">`);
    s.push(`<defs>
      <marker id="dh" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,1 L6,3.5 L0,6" fill="none" stroke="var(--dim)" stroke-width="1.2"/></marker>
      <marker id="dh2" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
        <path d="M6,1 L0,3.5 L6,6" fill="none" stroke="var(--dim)" stroke-width="1.2"/></marker>
      <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="4" height="4" fill="var(--wood)"/>
        <line x1="0" y1="0" x2="0" y2="4" stroke="var(--wood-edge)" stroke-opacity="0.35" stroke-width="0.9"/>
      </pattern>
      <pattern id="hatchL" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="4" height="4" fill="var(--lock)"/>
        <line x1="0" y1="0" x2="0" y2="4" stroke="var(--lock-edge)" stroke-opacity="0.4" stroke-width="0.9"/>
      </pattern>
    </defs>`);

    // Vägg/läkt bakom (referenslinje)
    s.push(`<line x1="${(mX-mX*0.6).toFixed(1)}" y1="${yBot.toFixed(1)}" x2="${(W-mX*0.4).toFixed(1)}" y2="${yBot.toFixed(1)}" stroke="var(--line)" stroke-width="${lw*1.6}" stroke-dasharray="${fs*0.3} ${fs*0.22}"/>`);

    // Bottenbrädor i snitt
    b.forEach(o=>{
      s.push(`<rect x="${o.x.toFixed(1)}" y="${yBoard.toFixed(1)}" width="${o.w.toFixed(1)}" height="${tb.toFixed(1)}" fill="url(#hatch)" stroke="var(--wood-edge)" stroke-width="${lw*1.6}"/>`);
    });

    // Lock ovanpå, centrerade över varje glipa
    gaps.forEach(gp=>{
      s.push(`<rect x="${(gp.c-wl/2).toFixed(1)}" y="${yLock.toFixed(1)}" width="${wl.toFixed(1)}" height="${tl.toFixed(1)}" fill="url(#hatchL)" stroke="var(--lock-edge)" stroke-width="${lw*1.6}"/>`);
    });

    // Snittlinjer (brytsymbol) på de yttersta, kapade brädorna
    function breakLine(x){
      const a = Math.max(tb*0.16, fs*0.28);      // zigzag-amplitud
      const n = 5, dy = tb/n;
      let d = `M ${x.toFixed(1)} ${(yBoard-fs*0.5).toFixed(1)} L ${x.toFixed(1)} ${yBoard.toFixed(1)}`;
      for(let i=0;i<n;i++){
        const xx = (i%2===0 ? x-a : x+a);
        d += ` L ${xx.toFixed(1)} ${(yBoard+dy*(i+0.5)).toFixed(1)}`;
      }
      d += ` L ${x.toFixed(1)} ${yBot.toFixed(1)} L ${x.toFixed(1)} ${(yBot+fs*0.5).toFixed(1)}`;
      return `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="${lw*1.5}" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    s.push(breakLine(b[0].x));                       // kap på bräda 1
    s.push(breakLine(b[3].x + b[3].w));              // kap på bräda 4

    // Glipans kantlinjer + mått under varje glipa
    const yG = yBot + fs*1.9;
    gaps.forEach(gp=>{
      [gp.gl,gp.gr].forEach(x=>{
        s.push(`<line x1="${x.toFixed(1)}" y1="${(yBoard-fs*1.3).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(yG+fs*0.3).toFixed(1)}" stroke="var(--dim)" stroke-width="${lw}" stroke-dasharray="${fs*0.22} ${fs*0.18}" opacity="0.7"/>`);
      });
      s.push(`<line x1="${gp.gl.toFixed(1)}" y1="${yG.toFixed(1)}" x2="${gp.gr.toFixed(1)}" y2="${yG.toFixed(1)}" stroke="var(--dim)" stroke-width="${lw*1.4}" marker-start="url(#dh2)" marker-end="url(#dh)"/>`);
      s.push(`<text x="${gp.c.toFixed(1)}" y="${(yG+fs*1.5).toFixed(1)}" font-size="${fs}" fill="var(--dim)" text-anchor="middle" font-weight="600">${fmt(g)}</text>`);
    });
    s.push(`<text x="${((gaps[0].c+gaps[2].c)/2).toFixed(1)}" y="${(yG+fs*3).toFixed(1)}" font-size="${fs*0.9}" fill="var(--dim)" text-anchor="middle">glipa ${fmt(g)} mm</text>`);

    // Överlapp – redovisas på mittersta locket
    const gm = gaps[1], lockL = gm.c - wl/2, lockR = gm.c + wl/2;
    const yO = yLock - fs*1.0;
    [[lockL,gm.gl],[gm.gr,lockR]].forEach(([a,c])=>{
      if(c-a > 0.3){
        s.push(`<line x1="${a.toFixed(1)}" y1="${yO.toFixed(1)}" x2="${c.toFixed(1)}" y2="${yO.toFixed(1)}" stroke="${bad?'var(--bad)':'var(--steel)'}" stroke-width="${lw*1.4}" marker-start="url(#dh2)" marker-end="url(#dh)"/>`);
      }
      s.push(`<line x1="${a.toFixed(1)}" y1="${(yO-fs*0.4).toFixed(1)}" x2="${a.toFixed(1)}" y2="${yLock.toFixed(1)}" stroke="var(--steel)" stroke-width="${lw*0.8}" opacity="0.5"/>`);
    });
    s.push(`<text x="${((lockL+gm.gl)/2).toFixed(1)}" y="${(yO-fs*0.55).toFixed(1)}" font-size="${fs*0.85}" fill="${bad?'var(--bad)':'var(--steel)'}" text-anchor="middle">${fmt(ov)}</text>`);
    s.push(`<text x="${((gm.gr+lockR)/2).toFixed(1)}" y="${(yO-fs*0.55).toFixed(1)}" font-size="${fs*0.85}" fill="${bad?'var(--bad)':'var(--steel)'}" text-anchor="middle">${fmt(ov)}</text>`);

    // Etiketter
    s.push(`<text x="${(b[1].x+wb/2).toFixed(1)}" y="${(yBoard+tb/2+fs*0.35).toFixed(1)}" font-size="${fs*0.78}" fill="var(--ink)" text-anchor="middle" opacity="0.75">${fmt(wb)}×${fmt(tb)}</text>`);
    s.push(`<text x="${gaps[0].c.toFixed(1)}" y="${(yLock+tl/2+fs*0.35).toFixed(1)}" font-size="${fs*0.72}" fill="#fff" text-anchor="middle">${fmt(wl)}×${fmt(tl)}</text>`);

    s.push(`</svg>`);
    el.innerHTML = `<div class="dhd">Detalj · genomskärning</div>`+s.join('');
  }

  function renderSelected(p){
    const o = state.opts[state.selected];
    if(!o) return;
    // markera vald kort
    document.querySelectorAll('.opt').forEach((b,i)=> b.classList.toggle('sel', i===state.selected));
    // varning uppdateras för valt alt
    const warnEl=$('warn');
    const overlap=(p.wl-o.g)/2;
    if(p.wl<=o.g+EPS){ warnEl.classList.remove('hidden'); warnEl.textContent=`⚠ Locket (${fmt(p.wl)} mm) täcker inte glipan (${fmt(o.g)} mm). Öka lockbredden.`; }
    else if(overlap<10){ warnEl.classList.remove('hidden'); warnEl.textContent=`⚠ Locket överlappar bara ${fmt(overlap)} mm på varje bottenbräda (rekommenderat ≥ 10 mm).`; }
    else { warnEl.classList.add('hidden'); }

    drawSVG(p,o);
    drawDetail(p,o);

    // Tabell
    const cc=o.cc, tb=$('tbl').querySelector('tbody');
    const off=p.off||0;
    let rows='';
    for(let k=0;k<o.N;k++){
      const left=k*cc+off, center=left+p.wb/2, right=left+p.wb;
      rows+=`<tr><td>#${k+1}</td><td>${fmt0(left)}</td><td>${fmt0(center)}</td><td class="pos">${fmt0(right)}</td></tr>`;
    }
    tb.innerHTML=rows;
  }

  // Events
  ['wb','tb','wl','tl','gmin','gmax','L','off'].forEach(id=>{
    $(id).addEventListener('input',()=>{ render(); });
  });
  $('gdes').addEventListener('input',()=>{ state.desiredManual=true; state.selected=0; render(); });
  // vid ändrad totallängd: nollställ val
  $('L').addEventListener('input',()=>{ state.selected=0; });

  render();
})();
</script>
